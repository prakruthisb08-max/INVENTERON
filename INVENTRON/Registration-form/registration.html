<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bootstrap Registration Form</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="Registration-form/registration.css">
</head>
<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    
    <div class="card p-4 form-box shadow">
        <h3 class="text-center mb-3">Register</h3>

        <form>
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" placeholder="Enter name">
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" placeholder="Enter email">
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="Enter password">
            </div>

            <div class="mb-3">
                <label class="form-label">Gender</label><br>
                <input type="radio" name="gender"> Male
                <input type="radio" name="gender" class="ms-2"> Female
            </div>

            <div class="mb-3">
                <label class="form-label">Skills</label><br>
                <input type="checkbox"> HTML
                <input type="checkbox" class="ms-2"> CSS
                <input type="checkbox" class="ms-2"> JavaScript
            </div>

            <div class="mb-3">
                <label class="form-label">Country</label>
                <select class="form-select">
                    <option>India</option>
                    <option>USA</option>
                    <option>UK</option>
                </select>
            </div>

            <button class="btn btn-primary w-100">Register</button>
        </form>
    </div>

</div>

</body>
</html>
