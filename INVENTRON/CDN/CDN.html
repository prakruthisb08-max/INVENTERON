<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Navbar with CDN</title>

<!-- Bootstrap CSS CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
    background-color: #f5f5f5;
}

/* Custom card */
.card {
    margin-top: 40px;
    border-radius: 10px;
    padding: 20px;
}
</style>

</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    
    <a class="navbar-brand" href="#">
      <i class="bi bi-github"></i> MyRepo
    </a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link active" href="#"><i class="bi bi-code"></i> Code</a></li>
        <li class="nav-item"><a class="nav-link" href="#"><i class="bi bi-bug"></i> Issues</a></li>
        <li class="nav-item"><a class="nav-link" href="#"><i class="bi bi-git"></i> Pull Requests</a></li>
      </ul>

      <button class="btn btn-success me-2">
        <i class="bi bi-plus-circle"></i> New
      </button>
      <button class="btn btn-outline-light">
        <i class="bi bi-box-arrow-in-right"></i> Login
      </button>
    </div>

  </div>
</nav>

<!-- Content -->
<div class="container">
  <div class="card shadow">

    <h3 class="text-primary">
      <i class="bi bi-folder"></i> Repository Files
    </h3>

    <hr>

    <!-- Buttons -->
    <button class="btn btn-primary">
      <i class="bi bi-upload"></i> Upload
    </button>

    <button class="btn btn-danger">
      <i class="bi bi-trash"></i> Delete
    </button>

    <button class="btn btn-warning">
      <i class="bi bi-pencil"></i> Edit
    </button>

  </div>
</div>

<!-- Bootstrap JS CDN -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
